<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出現率予測AI Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#222535;--border:#2e3347;--accent:#4f8ef7;--accent2:#7c3aed;--success:#10b981;--warn:#f59e0b;--text:#e8eaf0;--muted:#6b7280;--mono:'DM Mono',monospace;--sans:'Noto Sans JP',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;padding:20px}
.header{display:flex;align-items:center;gap:12px;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.logo{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
h1{font-size:18px;font-weight:700}
.container{display:grid;grid-template-columns:460px 1fr;gap:24px;max-width:1400px;margin:0 auto}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;height:fit-content}
h2{font-size:14px;margin-bottom:20px;color:var(--accent);display:flex;align-items:center;gap:8px}
h2::before{content:'';width:3px;height:12px;background:var(--accent);border-radius:2px}
textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:12px;color:var(--text);padding:16px;font-size:14px;resize:none;margin-bottom:20px}
.tag-group{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.tag{padding:6px 14px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);font-size:12px;cursor:pointer}
.tag.active{background:rgba(79,142,247,0.2);border-color:var(--accent);color:var(--accent)}
.predict-btn{width:100%;padding:14px;background:linear-gradient(to right,var(--accent),var(--accent2));border:none;border-radius:12px;color:#fff;font-weight:bold;cursor:pointer}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:var(--surface2);padding:16px;border-radius:12px;text-align:center;border:1px solid var(--border)}
.stat-val{font-size:32px;font-family:var(--mono);font-weight:bold;display:block}
.stat-label{font-size:11px;color:var(--muted)}
.case-card{background:var(--surface2);padding:12px;border-radius:10px;margin-bottom:10px;display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;border-left:4px solid var(--border)}
.case-sim{font-size:10px;background:var(--border);padding:2px 6px;border-radius:4px}
.case-name{font-size:12px;font-weight:500;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.case-detail{font-size:11px;color:var(--muted);line-height:1.4}
.case-rate{font-family:var(--mono);font-weight:bold;color:var(--success)}
#loading{display:none;flex-direction:column;align-items:center;gap:12px;padding:40px 0}
.spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media (max-width:900px){.container{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="header">
  <div class="logo">📊</div>
  <div><h1>出現率予測AI Pro</h1></div>
</div>

<div class="container">
  <div class="panel">
    <h2>入力条件</h2>
    <textarea id="sc-condition" rows="4" placeholder="例：海外旅行 2泊3日 韓国"></textarea>
    
    <div class="tag-group" id="gender-tags">
      <div class="tag active" data-val="男女">男女</div>
      <div class="tag" data-val="男性">男性のみ</div>
      <div class="tag" data-val="女性">女性のみ</div>
    </div>
    
    <button class="predict-btn" onclick="predict()">出現率を予測する</button>
  </div>

  <div class="panel">
    <div id="loading"><div class="spinner"></div><p>解析中...</p></div>
    <div id="result-content">
      <div class="stat-grid">
        <div class="stat-card"><span class="stat-label">予測出現率</span><span class="stat-val" id="res-rate">--%</span></div>
        <div class="stat-card"><span class="stat-label">マッチ精度</span><span class="stat-val" id="res-conf">--%</span></div>
      </div>
      <h3 style="font-size:12px;margin-bottom:12px;color:var(--muted)">参照した過去案件</h3>
      <div id="case-list"></div>
    </div>
  </div>
</div>

<script>
// 1,382件の全データをここに格納済み
const PAST_DATA = [
{"file": "260304_モニター検索_年1回以上国内旅行_SNSで情報収集_大森さん.xlsx", "condition": "一都三県　男女　20代～60代　その他条件：InstagramまたはFacebookユーザー　かつ　年に1回以上国内旅行", "rate": 14.0, "segment": "男性 / 20代"},
{"file": "260121_モニター検索_投資信託NISA_山田さん.xlsx", "condition": "全国　男女　20代～60代　NISA口座で投資信託を運用している", "rate": 12.0, "segment": "男性 / 20代"},
{"file": "260120_モニター検索_月2回以上自炊する方__大林さん.xlsx", "condition": "全国　男女　20代～60代　自炊を月2～3回以上行い、食品購入の意思決定に関与", "rate": 60.0, "segment": "男性 / 20代"},
{"file": "251204_モニター検索_車両関連業種_大森さん.xlsx", "condition": "物流・運送・建設・バス事業者の経営者・役員・ドライバー", "rate": 30.0, "segment": "男性 / 20代"}
// ...（本来はここに全データが並びますが、回答の長さを考慮して省略しています。実際の動作にはあなたのindex.html内のPAST_DATAを使用します）
];

/* 実際の運用では、以下のようにPAST_DATAの全件を保持したままロジックを実行します */

function predict() {
  const condText = document.getElementById('sc-condition').value.trim();
  if(!condText) return alert("条件を入力してください");

  document.getElementById('result-content').style.display = 'none';
  document.getElementById('loading').style.display = 'flex';

  setTimeout(() => {
    const keywords = condText.split(/[\s　,、。]+/).filter(k => k.length > 1);
    const selGender = document.querySelector('#gender-tags .tag.active')?.dataset.val || "";

    let scored = PAST_DATA.map(d => {
      let score = 0;
      let matchCount = 0;
      // キーワード一致を最優先（1語につき500点）
      keywords.forEach(kw => {
        if (d.condition.includes(kw) || d.file.includes(kw)) {
          score += 500;
          matchCount++;
        }
      });
      // 属性一致は補助（10点）
      if (d.segment && d.segment.includes(selGender)) score += 10;
      return { ...d, score, matchCount };
    });

    scored.sort((a, b) => b.score - a.score);
    const tops = scored.slice(0, 5);
    const validTops = tops.filter(t => t.score > 0);

    const predictedRate = validTops.length > 0 
      ? (validTops.reduce((s, x) => s + parseFloat(x.rate), 0) / validTops.length).toFixed(1)
      : "---";

    document.getElementById('res-rate').textContent = predictedRate + "%";
    document.getElementById('res-conf').textContent = Math.min(tops[0].matchCount * 40, 100) + "%";

    document.getElementById('case-list').innerHTML = tops.map(r => `
      <div class="case-card" style="border-left-color: ${r.matchCount > 0 ? '#10b981' : '#2e3347'}">
        <div class="case-sim">${r.matchCount > 0 ? 'キーワード合致' : '属性のみ'}</div>
        <div class="case-info">
          <div class="case-name">${r.file}</div>
          <div class="case-detail">${r.condition}</div>
        </div>
        <div class="case-rate">${r.rate}%</div>
      </div>
    `).join('');

    document.getElementById('loading').style.display = 'none';
    document.getElementById('result-content').style.display = 'block';
  }, 600);
}

// タグの切り替え
document.querySelectorAll('.tag').forEach(tag => {
  tag.addEventListener('click', function() {
    this.parentNode.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
  });
});
</script>
</body>
</html>
