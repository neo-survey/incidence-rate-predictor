<script>
// ここに元の index.html にあった「PAST_DATA = [...]」の塊をそのまま残してください。
// もし消えてしまった場合は、元のファイルのPAST_DATAの部分をここに貼り直します。

// --- 修正版：検索ロジック ---
function predict() {
  const condText = document.getElementById('sc-condition').value.trim();
  if(!condText) {
    alert("条件を入力してください");
    return;
  }

  // ローディング表示
  document.getElementById('result-content').style.display = 'none';
  document.getElementById('loading').style.display = 'flex';

  setTimeout(() => {
    // 1. 入力された言葉をバラバラにする（例：「海外旅行　韓国」→「海外旅行」「韓国」）
    const inputKeywords = condText.split(/[\s　,、。]+/).filter(k => k.length > 1);
    
    // 現在選択されているタグ（性別・年代・エリア）を取得
    const selGender = document.querySelector('#gender-tags .tag.active')?.dataset.val || "";
    const selAges = Array.from(document.querySelectorAll('#age-tags .tag.active')).map(t => t.dataset.val);
    const selAreas = Array.from(document.querySelectorAll('.area-group .tag.active')).map(t => t.dataset.val);

    // 2. 過去データすべてを1つずつチェック
    let scored = PAST_DATA.map(d => {
      let score = 0;
      let matchCount = 0;

      // 【最優先】キーワードが含まれているか？（1個につき500点）
      inputKeywords.forEach(kw => {
        if (d.condition.includes(kw) || d.file.includes(kw) || d.segment.includes(kw)) {
          score += 500; 
          matchCount++;
        }
      });

      // 【補助】属性が一致しているか？（1個につき10点）
      if (d.segment.includes(selGender)) score += 10;
      selAges.forEach(a => { if (d.segment.includes(a)) score += 5; });
      selAreas.forEach(ar => { if (d.segment.includes(ar)) score += 5; });

      return { ...d, score, matchCount };
    });

    // 3. スコアが高い順に並べる
    scored.sort((a, b) => b.score - a.score);
    
    // 上位5件をピックアップ
    const tops = scored.slice(0, 5);

    // 4. 数値の計算（スコア上位の平均）
    const validTops = tops.filter(t => t.score > 0);
    let predictedRate = "---";
    if (validTops.length > 0) {
      const sum = validTops.reduce((acc, cur) => acc + parseFloat(cur.rate), 0);
      predictedRate = (sum / validTops.length).toFixed(1);
    }

    // 5. 画面に表示する
    document.getElementById('res-rate').textContent = predictedRate + "%";
    
    // 信頼度（キーワードが1つでも入っていれば高くなるように設定）
    const confidence = Math.min(matchCount * 40, 100);
    document.getElementById('res-conf').textContent = confidence + "%";

    // 類似案件リストの作成
    const listBody = document.getElementById('case-list');
    listBody.innerHTML = tops.map(r => `
      <div class="case-card" style="${r.score >= 500 ? 'border-left: 4px solid #10b981;' : ''}">
        <div class="case-sim">${r.matchCount > 0 ? 'キーワード合致' : '属性のみ一致'}</div>
        <div class="case-info">
          <div class="case-name">${r.file}</div>
          <div class="case-detail">${r.condition}</div>
          <div style="font-size:10px; color:#6b7280">関連度スコア: ${r.score}</div>
        </div>
        <div class="case-rate">${r.rate}%</div>
      </div>
    `).join('');

    document.getElementById('loading').style.display = 'none';
    document.getElementById('result-content').style.display = 'block';
  }, 600);
}
</script>
